workflows:
  android-release:
    name: Android Release Build
    environment:
      android: default
      java: default
      flutter: stable
    triggering:
      events:
        - push
        - tag
      branch:
        patterns:
          - pattern: main
            include: true
          - pattern: develop
            include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build release APK
        script: flutter build apk --release --split-per-abi
      - name: Build AAB (for Play Store)
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/apk/release/*.apk
      - build/app/outputs/bundle/release/app.aab
    publishing:
      email:
        recipients:
          - user@example.com
      # Optional: publish to Google Play Store
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal

  web-release:
    name: Web Release Build
    environment:
      flutter: stable
    triggering:
      events:
        - push
        - tag
      branch:
        patterns:
          - pattern: main
            include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build web release
        script: flutter build web --release --web-renderer html
    artifacts:
      - build/web/**
    publishing:
      email:
        recipients:
          - user@example.com

  android-debug:
    name: Android Debug Build
    environment:
      android: default
      java: default
      flutter: stable
    triggering:
      events:
        - push
      branch:
        patterns:
          - pattern: develop
            include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - user@example.com
