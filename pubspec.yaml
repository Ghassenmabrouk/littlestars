name: jardin_enfant_parent
description: Mobile app for parents to track their children's activities in kindergarten.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  badges: ^3.1.1
  pdf: ^3.10.0
  printing: ^5.11.0
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  flutter_local_notifications: ^16.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
